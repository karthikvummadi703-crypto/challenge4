name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  # Public Firebase client identifiers — safe to embed in CI.
  # Demo Mode (used by E2E tests) does not make real Firebase calls,
  # so placeholder values keep the unit + build steps working without
  # exposing production credentials.
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder-api-key' }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-placeholder-project' }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.firebasestorage.app' }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:ci0000000000' }}
  VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || 'G-CIPLACEHOLDER' }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-session-secret-32-chars-min!!' }}
  DISABLE_HMR: "true"

jobs:
  # ─── Unit tests, type-check, lint, build ──────────────────────────────────
  unit:
    name: Unit tests, lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npx eslint .

      - name: Unit tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # ─── End-to-end tests (Playwright, Chromium) ──────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # E2E can run in parallel with unit tests — they share no state.
    #
    # ── Journey coverage without repo secrets ─────────────────────────────────
    # Journeys 1–3 (Fan, Volunteer, Admin Demo) run against Demo Mode and need
    # no real Firebase credentials — they pass with the placeholder values set
    # in the env block above.
    #
    # Journey 4 (Admin login rejection) makes a real Firebase Auth network call.
    # It self-skips with a visible reason when only placeholder credentials are
    # present.  To enable it, add the following as GitHub repo secrets:
    #   (Settings → Secrets and variables → Actions → New repository secret)
    #
    #   • VITE_FIREBASE_API_KEY          – Firebase Web API key
    #   • VITE_FIREBASE_AUTH_DOMAIN      – e.g. your-project.firebaseapp.com
    #   • VITE_FIREBASE_PROJECT_ID       – Firebase project ID
    #   • VITE_FIREBASE_STORAGE_BUCKET   – e.g. your-project.firebasestorage.app
    #   • VITE_FIREBASE_MESSAGING_SENDER_ID – numeric sender ID
    #   • VITE_FIREBASE_APP_ID           – Firebase app ID (1:…:web:…)
    #   • VITE_FIREBASE_MEASUREMENT_ID   – GA measurement ID
    #
    # When these secrets are set the env block above picks them up automatically
    # and Journey 4 runs on every push.  See also: replit.md § "CI / GitHub Secrets".
    # ──────────────────────────────────────────────────────────────────────────

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
